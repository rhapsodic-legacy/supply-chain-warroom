name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: backend
        run: |
          ruff check app/ tests/
          ruff format --check app/ tests/

      - name: Run unit tests
        working-directory: backend
        run: python -m pytest tests/test_seed_data.py tests/test_simulation_engine.py -v

      - name: Run API endpoint tests
        working-directory: backend
        run: python -m pytest tests/test_api_endpoints.py -v

      - name: Run E2E flow tests
        working-directory: backend
        run: python -m pytest tests/test_e2e_flows.py -v

      - name: Run simulated environment tests
        working-directory: backend
        run: python -m pytest tests/test_simulated_environment.py -v

      - name: Run full suite with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=html
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc -b

      - name: Run tests
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
