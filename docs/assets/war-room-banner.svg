<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1925;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid -->
  <g stroke="#1a2332" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Glow line -->
  <rect x="0" y="195" width="800" height="2" fill="url(#glow)"/>

  <!-- Status dots -->
  <circle cx="50" cy="30" r="4" fill="#3fb950" opacity="0.8"/>
  <circle cx="65" cy="30" r="4" fill="#3fb950" opacity="0.6"/>
  <circle cx="80" cy="30" r="4" fill="#f0883e" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="85" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="#e6edf3" letter-spacing="2">SUPPLY CHAIN</text>
  <text x="400" y="125" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="#58a6ff" letter-spacing="4">WAR ROOM</text>

  <!-- Subtitle -->
  <text x="400" y="160" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="12" fill="#484f58" letter-spacing="3">MULTI-AGENT AI RISK MONITORING &amp; SIMULATION</text>

  <!-- Corner accents -->
  <path d="M 10,10 L 30,10 L 30,12 L 12,12 L 12,30 L 10,30 Z" fill="#58a6ff" opacity="0.4"/>
  <path d="M 790,10 L 770,10 L 770,12 L 788,12 L 788,30 L 790,30 Z" fill="#58a6ff" opacity="0.4"/>
  <path d="M 10,190 L 30,190 L 30,188 L 12,188 L 12,170 L 10,170 Z" fill="#58a6ff" opacity="0.4"/>
  <path d="M 790,190 L 770,190 L 770,188 L 788,188 L 788,170 L 790,170 Z" fill="#58a6ff" opacity="0.4"/>
</svg>
